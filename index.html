<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>针灸推拿学·云题库</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #eef3ea;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', system-ui, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #1e2f1c;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* 两列布局 - PC端并排显示 */
        .two-columns {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .left-col {
            flex: 2;
            min-width: 280px;
        }
        .right-col {
            flex: 1;
            min-width: 260px;
        }
        /* 登录/注册面板样式 */
        .auth-panel {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 450px;
            margin: 2rem auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-panel h2 {
            margin-top: 0;
            color: #2a6e2a;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin: 12px 0;
            border: 1px solid #cbdcc2;
            border-radius: 60px;
            font-size: 1rem;
            background: #fefef9;
        }
        .auth-btn {
            background: #2a6e2a;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.8rem;
            margin-top: 12px;
        }
        .user-info-bar {
            background: white;
            border-radius: 1.5rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logout-btn {
            background: #c96a5e;
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .quiz-header {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 {
            margin: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        h1 span {
            font-size: 0.75rem;
            background: #e0edd9;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: normal;
        }
        .stats-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #eef5ea;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            justify-content: center;
        }
        .stats-group span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button {
            background: #2a6e2a;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-outline {
            background: #ecece4;
            color: #2d572c;
            border: 1px solid #9bbb97;
        }
        .btn-danger {
            background: #c96a5e;
        }
        .btn-submit {
            background: #2a6e2a;
            padding: 12px 24px;
            font-size: 0.95rem;
            margin-top: 12px;
            width: 100%;
        }
        .pagination-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0 12px;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .page-btn {
            background: #d9e6d5;
            color: #2b4f2a;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            white-space: nowrap;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .page-btn.active {
            background: #2a6e2a;
            color: white;
        }
        /* 进度网格 - 圆形样式 */
        .progress-grid {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            height: 100%;
        }
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #f9fbf7;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
            border-bottom: 1px solid #e0ecd9;
        }
        .grid-title {
            font-weight: 600;
            color: #3c6e3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .grid-toggle-icon {
            font-size: 1rem;
        }
        .grid-content {
            padding: 16px;
        }
        .grid-content.collapsed {
            display: none;
        }
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding: 4px;
        }
        /* 圆形题目块 */
        .question-block {
            background: #e9ece5;
            border-radius: 50%;
            text-align: center;
            padding: 0;
            width: 44px;
            height: 44px;
            line-height: 44px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid #cbdcc2;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .question-block:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .block-not-answered { background: #e0e8db; color: #4a6741; border-color: #c0d0b8; }
        .block-correct { background: #9fdf9f; color: #1b4d1b; border-color: #5fa05f; }
        .block-wrong { background: #f4acb7; color: #8b2c2c; border-color: #d9534f; }
        
        /* 错题本面板 - 与网格并列 */
        .wrong-book-panel {
            background: white;
            border-radius: 1.5rem;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .wrong-book-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #fff5f3;
            border-bottom: 1px solid #f0c0b8;
        }
        .wrong-book-title {
            font-weight: bold;
            color: #b13b2d;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .wrong-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px;
            max-height: 350px;
            overflow-y: auto;
        }
        .wrong-tag {
            background: #f4acb7;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            line-height: 44px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #8b2c2c;
        }
        .wrong-tag:hover {
            transform: scale(1.05);
            background: #e68a8a;
            color: white;
        }
        
        .question-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 20px 0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: 1px solid #d9e8d9;
        }
        .question-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.75rem;
            color: #5e735c;
            border-left: 4px solid #7caf7c;
            padding-left: 14px;
            margin-bottom: 16px;
            align-items: center;
        }
        .quick-jump {
            margin-left: auto;
            background: #e0ecd9;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .question-text {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.45;
            margin-bottom: 1.2rem;
            color: #1f3c1d;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-item {
            background: #fefef9;
            border: 1.5px solid #d0e2cf;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.1s;
        }
        .option-item:hover:not(.disabled-opt) {
            background: #eaf4e8;
        }
        .option-checkbox {
            width: 20px;
            height: 20px;
            accent-color: #2a6e2a;
            flex-shrink: 0;
        }
        .option-prefix {
            font-weight: 800;
            background: #e2efdf;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .correct-highlight {
            background: #c8e6c9;
            border-color: #2e7d32;
        }
        .wrong-highlight {
            background: #ffebee;
            border-color: #d32f2f;
            text-decoration: line-through;
        }
        .disabled-opt {
            cursor: default;
            opacity: 0.9;
            pointer-events: none;
        }
        .feedback {
            background: #f2f7ef;
            border-left: 4px solid #4caf50;
            padding: 12px 16px;
            border-radius: 30px;
            margin-top: 16px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .feedback-wrong {
            border-left-color: #d9534f;
            background: #fff5f3;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 20px;
        }
        .nav-buttons button {
            flex: 1;
            padding: 12px;
            font-size: 0.9rem;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 24px;
            color: #6b8568;
            padding-bottom: 20px;
        }
        .save-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a6e2a;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        /* 响应式：小屏幕时两列变单列 */
        @media (max-width: 900px) {
            body { padding: 12px; }
            .two-columns {
                flex-direction: column;
            }
            .left-col, .right-col {
                width: 100%;
            }
            .question-text { font-size: 0.98rem; }
            .option-item { padding: 10px 14px; font-size: 0.85rem; }
            .question-block, .wrong-tag {
                width: 38px;
                height: 38px;
                line-height: 38px;
                font-size: 0.75rem;
            }
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .question-block, .wrong-tag {
                width: 34px;
                height: 34px;
                line-height: 34px;
                font-size: 0.7rem;
            }
            .stats-group { font-size: 0.7rem; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="root">
    <div id="appMount"></div>
</div>

<script>
    // Supabase 配置
    const SUPABASE_URL = 'https://woimziponrsxkgrdqasa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_aHK3etRyH_8k1vNQGdRUcg_v7-vTUwf';
    
    let supabaseClient = null;
    let currentUser = null;
    
    // 题库数据（请替换为您的完整500题）
    let masterQuestionsRaw = [];
    for (let i = 1; i <= 500; i++) {
        masterQuestionsRaw.push({
            "image_name": i,  // 直接用数字
            "题型": i % 3 === 0 ? "多选题" : "单选题",
            "题目": `这是第${i}道题目，请选择正确答案。`,
            "选项": { "A": "选项A", "B": "选项B", "C": "选项C", "D": "选项D" },
            "正确答案": "A"
        });
    }
    
    let masterQuestions = [];
    let userAnswers = [];
    let answerStatus = [];
    let currentIndex = 0;
    let currentPage = 1;
    let wrongSet = new Set();
    let isSubmitting = false;
    let isGridCollapsed = false; // 默认展开
    
    let dynamicQuestionDiv, gridContainer, paginationBar, wrongListContainer, wrongCountBadge, gridContent, toggleIcon, gridHeader, saveHint;
    let resetAllProgressBtn, clearWrongBookBtn, gotoFirstWrongBtn, prevBtn, nextBtn;
    
    function showSaveHintMsg() {
        const hint = document.getElementById('saveHint');
        if(hint) { hint.style.opacity = '1'; setTimeout(() => { hint.style.opacity = '0'; }, 1200); }
    }
    
    async function saveProgressToCloud() {
        if (!currentUser || !supabaseClient) return;
        const progressMap = {};
        for (let i = 0; i < masterQuestions.length; i++) {
            const q = masterQuestions[i];
            const key = String(q.image_name);
            if (userAnswers[i] !== undefined && userAnswers[i] !== null) {
                progressMap[key] = { answer: userAnswers[i], isCorrect: answerStatus[i] };
            }
        }
        const payload = { user_id: currentUser.id, progress_data: progressMap, updated_at: new Date() };
        const { error } = await supabaseClient.from('user_progress').upsert(payload, { onConflict: 'user_id' });
        if (error) console.warn('云端保存失败', error);
        else showSaveHintMsg();
    }
    
    async function loadProgressFromCloud() {
        if (!currentUser || !supabaseClient) return false;
        const { data, error } = await supabaseClient.from('user_progress').select('progress_data').eq('user_id', currentUser.id).maybeSingle();
        if (error || !data) return false;
        const progressMap = data.progress_data;
        if (!progressMap) return false;
        let restored = 0;
        for (let i = 0; i < masterQuestions.length; i++) {
            const q = masterQuestions[i];
            const key = String(q.image_name);
            if (progressMap[key]) {
                userAnswers[i] = progressMap[key].answer;
                answerStatus[i] = progressMap[key].isCorrect;
                if (answerStatus[i] === false) wrongSet.add(i);
                restored++;
            }
        }
        return restored > 0;
    }
    
    async function syncAndRender() {
        updateHeaderStats();
        updateWrongBookUI();
        renderGrid(currentPage);
        renderCurrentQuestion();
        buildPagination();
        await saveProgressToCloud();
    }
    
    function updateHeaderStats() {
        if (!masterQuestions.length) return;
        let done = 0, correct = 0, wrong = 0;
        for (let i = 0; i < answerStatus.length; i++) {
            if (answerStatus[i] === true) { done++; correct++; }
            else if (answerStatus[i] === false) { done++; wrong++; }
        }
        const doneEl = document.getElementById('doneCount');
        if(doneEl) doneEl.innerText = done;
        const correctEl = document.getElementById('correctCount');
        if(correctEl) correctEl.innerText = correct;
        const wrongEl = document.getElementById('wrongCount');
        if(wrongEl) wrongEl.innerText = wrong;
        const totalEl = document.getElementById('totalQ');
        if(totalEl) totalEl.innerText = masterQuestions.length;
    }
    
    function updateWrongBookUI() {
        if (!wrongListContainer) return;
        const wrongArr = Array.from(wrongSet).sort((a,b)=>a-b);
        if(wrongCountBadge) wrongCountBadge.innerText = wrongArr.length;
        wrongListContainer.innerHTML = wrongArr.length === 0 ? '<div style="width:100%; text-align:center; color:#aaa; padding:20px;">暂无错题</div>' : '';
        wrongArr.forEach(idx => {
            const q = masterQuestions[idx];
            const tag = document.createElement('div');
            tag.className = 'wrong-tag';
            tag.innerText = String(q.image_name);
            tag.onclick = () => { currentIndex = idx; updatePaginationByIndex(); renderCurrentQuestion(); };
            wrongListContainer.appendChild(tag);
        });
    }
    
    function updatePaginationByIndex() {
        const targetPage = Math.floor(currentIndex / 100) + 1;
        if (targetPage !== currentPage) { currentPage = targetPage; renderGrid(currentPage); buildPagination(); }
        else renderGrid(currentPage);
    }
    
    function isMultiAnswerEqual(userArr, correctStr) {
        let correctArr = correctStr.split('').filter(c => /[A-Z]/.test(c)).sort();
        let userSorted = [...userArr].sort();
        return userSorted.length === correctArr.length && userSorted.every((v,i) => v === correctArr[i]);
    }
    
    async function submitSingleAnswer(selectedKey) {
        if (isSubmitting || userAnswers[currentIndex] !== undefined) return;
        const q = masterQuestions[currentIndex];
        const isCorrect = (selectedKey === q.正确答案);
        isSubmitting = true;
        userAnswers[currentIndex] = selectedKey;
        answerStatus[currentIndex] = isCorrect;
        if (!isCorrect) wrongSet.add(currentIndex);
        else wrongSet.delete(currentIndex);
        await syncAndRender();
        if (isCorrect) {
            setTimeout(() => {
                isSubmitting = false;
                if (currentIndex + 1 < masterQuestions.length) {
                    currentIndex++;
                    updatePaginationByIndex();
                    renderCurrentQuestion();
                } else alert('🎉 恭喜！已完成所有题目！');
            }, 350);
        } else {
            setTimeout(() => { isSubmitting = false; }, 200);
        }
    }
    
    async function submitMultiAnswer() {
        if (isSubmitting || userAnswers[currentIndex] !== undefined) return;
        const selected = [];
        const checkboxes = document.querySelectorAll('#optionsArea input[type="checkbox"]:checked');
        checkboxes.forEach(cb => selected.push(cb.value));
        if (selected.length === 0) { alert('请至少选择一个选项'); return; }
        const q = masterQuestions[currentIndex];
        const isCorrect = isMultiAnswerEqual(selected, q.正确答案);
        isSubmitting = true;
        userAnswers[currentIndex] = selected;
        answerStatus[currentIndex] = isCorrect;
        if (!isCorrect) wrongSet.add(currentIndex);
        else wrongSet.delete(currentIndex);
        await syncAndRender();
        if (isCorrect) {
            setTimeout(() => {
                isSubmitting = false;
                if (currentIndex + 1 < masterQuestions.length) {
                    currentIndex++;
                    updatePaginationByIndex();
                    renderCurrentQuestion();
                } else alert('🎉 恭喜！已完成所有题目！');
            }, 350);
        } else {
            setTimeout(() => { isSubmitting = false; }, 200);
        }
    }
    
    function expandGridAndLocate() {
        if (isGridCollapsed && toggleGrid) toggleGrid();
        setTimeout(() => {
            const block = document.querySelector(`.question-block[data-idx="${currentIndex}"]`);
            if (block) { block.scrollIntoView({ behavior: 'smooth', block: 'center' }); block.style.boxShadow = '0 0 0 3px #2a6e2a'; setTimeout(() => block.style.boxShadow = '', 1000); }
        }, 100);
    }
    
    function renderCurrentQuestion() {
        if (!dynamicQuestionDiv || !masterQuestions.length) return;
        const q = masterQuestions[currentIndex];
        const isMulti = (q.题型 === '多选题');
        const userChoice = userAnswers[currentIndex];
        const answered = (userChoice !== undefined && userChoice !== null);
        const options = q.选项;
        const optionKeys = Object.keys(options).sort();
        let optionsHtml = '';
        for (let key of optionKeys) {
            let checkedAttr = '';
            if (answered && isMulti && Array.isArray(userChoice) && userChoice.includes(key)) checkedAttr = 'checked';
            const inputType = isMulti ? 'checkbox' : 'radio';
            const inputName = isMulti ? `opt_multi_${currentIndex}` : `opt_single_${currentIndex}`;
            let itemClass = 'option-item';
            if (answered) {
                const isOptCorrect = (isMulti && q.正确答案.includes(key)) || (!isMulti && key === q.正确答案);
                const isUserSelected = (isMulti && Array.isArray(userChoice) && userChoice.includes(key)) || (!isMulti && userChoice === key);
                if (isUserSelected && !isOptCorrect) itemClass += ' wrong-highlight';
                else if (isOptCorrect) itemClass += ' correct-highlight';
                itemClass += ' disabled-opt';
            }
            optionsHtml += `<div class="${itemClass}" data-key="${key}"><input type="${inputType}" name="${inputName}" value="${key}" class="${isMulti ? 'option-checkbox' : ''}" ${checkedAttr} ${answered ? 'disabled' : ''}><span class="option-prefix">${key}</span><span>${escapeHtml(options[key])}</span></div>`;
        }
        let submitButtonHtml = (!answered && isMulti) ? `<button id="submitMultiBtn" class="btn-submit">📝 提交答案</button>` : '';
        let feedbackHtml = '';
        if (answered) {
            const isCurrCorrect = answerStatus[currentIndex];
            feedbackHtml = `<div class="feedback ${!isCurrCorrect ? 'feedback-wrong' : ''}">${isCurrCorrect ? '✅ 回答正确！' : `❌ 回答错误。 正确答案: ${q.正确答案}`}${!isCurrCorrect ? '<br>📘 已加入错题本' : '<br>🎉 正确！自动跳转下一题'}</div>`;
        }
        const cardHtml = `<div class="question-card"><div class="question-meta"><span>🆔 第 ${q.image_name} 题</span><span>📝 ${escapeHtml(q.题型)}</span><span>🔢 ${currentIndex+1}/${masterQuestions.length}</span>${answered ? '<span>✅ 已答</span>' : '<span>⭕ 未答</span>'}<span class="quick-jump" id="quickJumpBtn">🗂️ 展开网格</span></div><div class="question-text">${escapeHtml(q.题目)}</div><div class="options" id="optionsArea">${optionsHtml}</div>${submitButtonHtml}${feedbackHtml}</div>`;
        dynamicQuestionDiv.innerHTML = cardHtml;
        const quickJumpBtn = document.getElementById('quickJumpBtn');
        if (quickJumpBtn) quickJumpBtn.onclick = expandGridAndLocate;
        if (!answered && !isMulti) {
            const optionDivs = document.querySelectorAll('#optionsArea .option-item');
            optionDivs.forEach(div => {
                const radio = div.querySelector('input[type="radio"]');
                if (radio) {
                    const clickHandler = () => { if (!userAnswers[currentIndex]) submitSingleAnswer(radio.value); };
                    div.addEventListener('click', clickHandler);
                    radio.addEventListener('click', (e) => { e.stopPropagation(); clickHandler(); });
                }
            });
        } else if (!answered && isMulti) {
            const submitBtn = document.getElementById('submitMultiBtn');
            if (submitBtn) submitBtn.onclick = () => submitMultiAnswer();
        }
    }
    
    function renderGrid(page) {
        if (!gridContainer || !masterQuestions.length) return;
        const perPage = 100;
        const start = (page-1)*perPage;
        const end = Math.min(start+perPage, masterQuestions.length);
        gridContainer.innerHTML = '';
        for (let i = start; i < end; i++) {
            let statusClass = 'block-not-answered';
            if (answerStatus[i] === true) statusClass = 'block-correct';
            else if (answerStatus[i] === false) statusClass = 'block-wrong';
            const block = document.createElement('div');
            block.className = `question-block ${statusClass}`;
            block.setAttribute('data-idx', i);
            block.innerText = String(masterQuestions[i].image_name);
            block.onclick = () => { currentIndex = i; updatePaginationByIndex(); renderCurrentQuestion(); };
            gridContainer.appendChild(block);
        }
    }
    
    function buildPagination() {
        if (!paginationBar) return;
        const totalPages = Math.ceil(masterQuestions.length/100);
        paginationBar.innerHTML = '';
        for (let i=1; i<=totalPages; i++) {
            const btn = document.createElement('button');
            btn.innerText = `📖 ${(i-1)*100+1}-${Math.min(i*100, masterQuestions.length)}`;
            btn.classList.add('page-btn');
            if (i===currentPage) btn.classList.add('active');
            btn.onclick = () => { currentPage = i; renderGrid(currentPage); const firstIdx = (currentPage-1)*100; if(firstIdx<masterQuestions.length) currentIndex=firstIdx; renderCurrentQuestion(); buildPagination(); };
            paginationBar.appendChild(btn);
        }
    }
    
    async function resetAll() {
        if (!confirm('重置所有进度？')) return;
        userAnswers = new Array(masterQuestions.length).fill(undefined);
        answerStatus = new Array(masterQuestions.length).fill(null);
        wrongSet.clear();
        currentIndex = 0; currentPage = 1;
        await syncAndRender();
    }
    
    async function clearWrongBook() {
        if (!confirm('清空错题本会重置错题记录，确定吗？')) return;
        for (let i = 0; i < answerStatus.length; i++) {
            if (answerStatus[i] === false) { userAnswers[i] = undefined; answerStatus[i] = null; }
        }
        wrongSet.clear();
        await syncAndRender();
        renderCurrentQuestion();
    }
    
    function gotoFirstWrong() {
        const wrongArr = Array.from(wrongSet).sort((a,b)=>a-b);
        if (wrongArr.length) { currentIndex = wrongArr[0]; updatePaginationByIndex(); renderCurrentQuestion(); }
        else alert('暂无错题！');
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function toggleGrid() { isGridCollapsed = !isGridCollapsed; if (isGridCollapsed) { gridContent.classList.add('collapsed'); toggleIcon.innerHTML = '▶'; } else { gridContent.classList.remove('collapsed'); toggleIcon.innerHTML = '▼'; } }
    
    async function logout() {
        if (supabaseClient) await supabaseClient.auth.signOut();
        currentUser = null;
        renderAuthScreen();
    }
    
    function renderMainApp() {
        const mount = document.getElementById('appMount');
        mount.innerHTML = `
            <div class="user-info-bar"><span>👤 ${currentUser?.email || '用户'}</span><button id="logoutBtnMain" class="logout-btn">🚪 退出登录</button></div>
            <div class="quiz-header"><h1>📚 针灸推拿学<span>500题 | 云端同步</span></h1><div class="stats-group"><span>📊 已做: <strong id="doneCount">0</strong> / <span id="totalQ">500</span></span><span>✅ 正确: <strong id="correctCount">0</strong></span><span>❌ 错误: <strong id="wrongCount">0</strong></span><button id="resetAllProgressBtn" class="btn-outline">🗑️ 重置</button><button id="clearWrongBookBtn" class="btn-danger">📖 清错题</button></div></div>
            <div class="pagination-bar" id="paginationBar"></div>
            <div class="two-columns">
                <div class="left-col">
                    <div class="progress-grid">
                        <div class="grid-header" id="gridHeader">
                            <div class="grid-title">📌 进度网格 · 点击跳转</div>
                            <span class="grid-toggle-icon" id="toggleIcon">▼</span>
                        </div>
                        <div class="grid-content" id="gridContent">
                            <div id="gridContainer" class="grid-container"></div>
                        </div>
                    </div>
                </div>
                <div class="right-col">
                    <div class="wrong-book-panel">
                        <div class="wrong-book-header">
                            <div class="wrong-book-title">📖 错题本 (<span id="wrongCountBadge">0</span>)</div>
                            <button id="gotoFirstWrongBtn" class="btn-outline" style="padding:6px 14px;">🎯 练习错题</button>
                        </div>
                        <div id="wrongListContainer" class="wrong-list"></div>
                    </div>
                </div>
            </div>
            <div id="questionPanel"><div id="dynamicQuestion"></div><div class="nav-buttons"><button id="prevBtn">◀ 上一题</button><button id="nextBtn">下一题 ▶</button></div></div>
            <div class="footer">✅ 单选题点击选项直接判题 | 多选题勾选后点提交 | 进度自动云端保存</div>
            <div class="save-hint" id="saveHint">✓ 进度已保存</div>
        `;
        
        dynamicQuestionDiv = document.getElementById('dynamicQuestion');
        gridContainer = document.getElementById('gridContainer');
        paginationBar = document.getElementById('paginationBar');
        wrongListContainer = document.getElementById('wrongListContainer');
        wrongCountBadge = document.getElementById('wrongCountBadge');
        gridContent = document.getElementById('gridContent');
        toggleIcon = document.getElementById('toggleIcon');
        gridHeader = document.getElementById('gridHeader');
        saveHint = document.getElementById('saveHint');
        resetAllProgressBtn = document.getElementById('resetAllProgressBtn');
        clearWrongBookBtn = document.getElementById('clearWrongBookBtn');
        gotoFirstWrongBtn = document.getElementById('gotoFirstWrongBtn');
        prevBtn = document.getElementById('prevBtn');
        nextBtn = document.getElementById('nextBtn');
        
        if(gridHeader) gridHeader.addEventListener('click', toggleGrid);
        if(gridContent) gridContent.classList.remove('collapsed');
        if(toggleIcon) toggleIcon.innerHTML = '▼';
        resetAllProgressBtn && resetAllProgressBtn.addEventListener('click', resetAll);
        clearWrongBookBtn && clearWrongBookBtn.addEventListener('click', clearWrongBook);
        gotoFirstWrongBtn && gotoFirstWrongBtn.addEventListener('click', gotoFirstWrong);
        prevBtn && prevBtn.addEventListener('click', () => { if(currentIndex>0) { currentIndex--; updatePaginationByIndex(); renderCurrentQuestion(); } });
        nextBtn && nextBtn.addEventListener('click', () => { if(currentIndex+1<masterQuestions.length) { currentIndex++; updatePaginationByIndex(); renderCurrentQuestion(); } });
        document.getElementById('logoutBtnMain')?.addEventListener('click', logout);
        
        masterQuestions = [...masterQuestionsRaw];
        masterQuestions.forEach((q,idx) => { if(!q.image_name) q.image_name = idx + 1; });
        userAnswers = new Array(masterQuestions.length).fill(undefined);
        answerStatus = new Array(masterQuestions.length).fill(null);
        wrongSet.clear();
        loadProgressFromCloud().then(() => { updateHeaderStats(); updateWrongBookUI(); renderGrid(1); renderCurrentQuestion(); buildPagination(); });
    }
    
    async function handleSignIn(email, password) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { 
            alert('登录失败：' + error.message);
            return false; 
        }
        currentUser = data.user;
        return true;
    }
    
    function renderAuthScreen() {
        const mount = document.getElementById('appMount');
        mount.innerHTML = `<div class="auth-panel"><h2>📖 针灸推拿学题库</h2><p style="margin-bottom:20px;">请输入管理员分配的账号登录</p><input type="email" id="authEmail" class="auth-input" placeholder="电子邮箱"><input type="password" id="authPassword" class="auth-input" placeholder="密码"><button id="loginBtn" class="auth-btn">登录</button><div id="errorMsg" class="error-msg"></div><div style="margin-top:20px; font-size:0.7rem; color:#aaa;">如有问题请联系管理员</div></div>`;
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.onclick = async () => {
            const email = document.getElementById('authEmail').value.trim();
            const pwd = document.getElementById('authPassword').value.trim();
            if (!email || !pwd) { alert('请输入邮箱和密码'); return; }
            const ok = await handleSignIn(email, pwd);
            if (ok) renderMainApp();
        };
    }
    
    async function initSupabaseAndAuth() {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session?.user) { 
            currentUser = session.user; 
            renderMainApp(); 
        } else {
            renderAuthScreen();
        }
    }
    
    initSupabaseAndAuth();
</script>
</body>
</html>
